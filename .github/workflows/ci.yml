name: CI Chat Challenge

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  backend-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
      - name: Install dependencies
        working-directory: ./backend
        run: npm ci
      - name: Run tests
        working-directory: ./backend
        run: npm test

  frontend-react-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        working-directory: ./react-frontend
        run: npm install
      - name: Run tests
        working-directory: ./react-frontend
        run: npm test

  frontend-vue-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        working-directory: ./vue-frontend
        run: npm install
      - name: Run tests
        working-directory: ./vue-frontend
        run: npm test

  e2e-tests:
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-react-test, frontend-vue-test]
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install All Dependencies
        run: |
          cd backend && npm install
          cd ../react-frontend && npm install
          cd ../vue-frontend && npm install
          cd ../e2e && npm install

      - name: Install Playwright Browsers
        working-directory: ./e2e
        run: npx playwright install --with-deps chromium

      - name: Start Servers and Run E2E
        run: |
          # Start Backend in background
          npm run start --prefix backend &
          
          # Start React in background
          npm run dev --prefix react-frontend &
          
          # Start Vue in background
          npm run dev --prefix vue-frontend &
          
          # Wait for servers to be ready
          npx wait-on http://localhost:4000 http://localhost:5173 http://localhost:5174 -t 60000
          
          # Run E2E tests
          npm test --prefix e2e
