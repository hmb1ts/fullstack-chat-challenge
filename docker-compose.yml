version: '3.8'

services:
  backend:
    build: ./backend
    ports:
      - "4000:4000"
    environment:
      - PORT=4000

  react-client:
    build: ./react-frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_SOCKET_URL=http://localhost:4000
    depends_on:
      - backend

  vue-client:
    build: ./vue-frontend
    ports:
      - "5174:5174"
    environment:
      - VITE_SOCKET_URL=http://localhost:4000
    depends_on:
      - backend
